<footer class="site-footer">
    <section class="copyright">
        <!-- 第一行：© 年份 站名 All rights reserved. -->
        &copy; {{ now.Year }} {{ .Site.Title }} All rights reserved.<br>

        <br>

        <!-- 第二、三、四行：細字小字 -->
        <span style="font-size: 0.875rem; font-weight: 400; opacity: 0.75;">
            <span id="site-runtime">Loading...</span><br>
            Built with <a href="https://gohugo.io/" target="_blank" rel="noopener">Hugo</a><br>
            Theme <span style="font-weight: 400;">Stack</span> designed by <a href="https://jimmycai.com" target="_blank" rel="noopener">Jimmy</a>
        </span>

    </section>
</footer>

<script>
(function() {
    const start = new Date("2026-04-25T06:25:43");

    // Hugo 自動加總所有文章字數
    const totalChars = {{ range .Site.RegularPages }}{{ .WordCount }}+{{ end }}0;
    const totalK = (totalChars / 1000).toFixed(1);

    function update() {
        const diff = Date.now() - start.getTime();
        const days  = Math.floor(diff / 86400000);
        const hours = Math.floor((diff % 86400000) / 3600000);
        const mins  = Math.floor((diff % 3600000) / 60000);
        const el = document.getElementById("site-runtime");
        if (el) {
            el.textContent =
                `This blog has been existing for ${days} days, ${hours} hours, ${mins} mins, with a total of ${totalK}k words.`;
        }
    }
    update();
    setInterval(update, 60000);
})();
</script>
