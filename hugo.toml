baseURL = 'https://m7chu.github.io/'
title   = '歲歲安瀾'
theme   = 'stack'

# 單語言模式（不顯示語言切換按鈕）
languageCode = "zh-tw"

[params]
    mainSections = ["posts", "post"]
    featuredImageField = "image"
    rssFullContent     = true
    defaultTheme       = "light" # 預設淺色；改 "dark" 可預設深色

    [params.author]
        name     = "m7chu"
        headline = "昭昭如願。"
        avatar   = "img/m7chu.jpg"   # 字串格式，不能改成巢狀
    
    [params.sidebar]
    subtitle = "昭昭如願。"
    avatar   = "img/m7chu.jpg"

    [params.widgets]
        sidebar = ["search", "archives", "categories", "tag-cloud"]

    [params.article]
        readingTime = false          # 關閉閱讀時間顯示
        [params.article.license]
            enabled = true
            default = "Licensed under [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/)"

    [params.footer]
        since = 2026

# ── 左側邊欄選單（由上到下共四項）────────────────────

# 第一項：首頁
[[menu.main]]
    identifier = "home"
    name       = "Home"
    url        = "/"
    weight     = 1  # weight 數字越小越靠上

# 第二項：關於頁面（需建立 content/about/_index.md）
[[menu.main]]
    identifier = "about"
    name       = "About"
    url        = "/about/"
    weight     = 2

# 第三項：文章歸檔（需建立 content/archives/_index.md）
[[menu.main]]
    identifier = "archives"
    name       = "Archive"
    url        = "/archives/"
    weight     = 3

# 第四項：創作頁面（需建立 content/work/_index.md）
[[menu.main]]
    identifier = "work"
    name       = "Work"
    url        = "/work/"
    weight     = 4

# ── 社交連結 ──────────────────────────────────────────
[[params.social]]
    identifier = "github"
    name       = "GitHub"
    url        = "https://github.com/m7chu"
    [params.social.params]
        icon = "brand-github"