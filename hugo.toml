baseURL = 'https://m7chu.github.io/'
languageCode = 'zh-tw'
title = '歲歲安瀾'
theme = 'stack'

[params]
    mainSections = ["posts"]
    featuredImageField = "image"
    rssFullContent = true

    # 這裡控制側邊欄的整體呈現
    [params.sidebar]
        emoji    = "🌊"
        subtitle = "歲歲安瀾，心之所向。"
        avatar   = "/img/avatar.jpg"

    # 這裡控制作者資訊
    [params.author]
        name     = "m7chu"
        headline = "歲歲安瀾，心之所向。"
        avatar   = "/img/avatar.jpg"

    # 這裡控制側邊欄要顯示哪些小工具
    [params.widgets]
        sidebar = ["search", "archives", "categories", "tag-cloud"]

    # 文章設定
    [params.article]
        [params.article.license]
            enabled = true
            default = "Licensed under [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/)"

    # 頁腳設定
    [params.footer]
        since = 2026

# 選單設定（這部分維持在最外層沒問題）
[[menu.main]]
    identifier = "home"
    name       = "首頁"
    url        = "/"
    weight     = 1

[[menu.main]]
    identifier = "archives"
    name       = "歸檔"
    url        = "/archives/"
    weight     = 2

# 社交連結
[[params.social]]
    identifier = "github"
    name       = "GitHub"
    url        = "https://github.com/m7chu"
    [params.social.params]
        icon = "brand-github"